<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="560" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1250" cy="100" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1300" cy="150" r="300" fill="rgba(255,255,255,0.02)"/>
  <circle cx="150" cy="450" r="250" fill="rgba(255,255,255,0.02)"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="1400" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="1400" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1400" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="1400" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1400" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="480" x2="1400" y2="480" stroke="white" stroke-width="1"/>
  </g>

  <!-- Left side content -->
  <!-- Icon -->
  <g transform="translate(120, 160)">
    <rect x="0" y="0" width="56" height="48" rx="8" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
    <line x1="12" y1="14" x2="38" y2="14" stroke="white" stroke-width="2.5" opacity="0.6"/>
    <line x1="12" y1="24" x2="32" y2="24" stroke="white" stroke-width="2.5" opacity="0.6"/>
    <line x1="12" y1="34" x2="36" y2="34" stroke="white" stroke-width="2.5" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="120" y="268" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1.5">MTP Workbench</text>

  <!-- Subtitle -->
  <text x="120" y="308" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.75)">Methodology Workspace for AI Platforms</text>

  <!-- Feature pills -->
  <g transform="translate(120, 350)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="110" height="40" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text x="55" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Capture</text>
    </g>
    <g transform="translate(125, 0)">
      <rect x="0" y="0" width="116" height="40" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text x="58" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Organize</text>
    </g>
    <g transform="translate(256, 0)">
      <rect x="0" y="0" width="118" height="40" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text x="59" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Compose</text>
    </g>
    <g transform="translate(389, 0)">
      <rect x="0" y="0" width="100" height="40" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text x="50" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Track</text>
    </g>
  </g>

  <!-- Platform section -->
  <g transform="translate(120, 430)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.45)" letter-spacing="2">WORKS WITH</text>
    <g transform="translate(0, 20)">
      <text x="0" y="14" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.7)">Claude</text>
      <text x="60" y="14" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.3)">|</text>
      <text x="75" y="14" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.7)">ChatGPT</text>
      <text x="155" y="14" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.3)">|</text>
      <text x="170" y="14" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.7)">Gemini</text>
      <text x="240" y="14" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.3)">|</text>
      <text x="255" y="14" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.7)">Copilot</text>
    </g>
  </g>

  <!-- Tagline at bottom -->
  <text x="120" y="520" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.4)" letter-spacing="3">100% LOCAL  ·  ZERO CLOUD  ·  OPEN SOURCE</text>

  <!-- Right side: mockup card -->
  <g transform="translate(780, 80)">
    <rect x="0" y="0" width="500" height="400" rx="16" fill="url(#card-bg)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Card header -->
    <rect x="0" y="0" width="500" height="50" rx="16" fill="rgba(255,255,255,0.06)"/>
    <rect x="0" y="34" width="500" height="16" fill="rgba(255,255,255,0.06)"/>
    <circle cx="28" cy="25" r="6" fill="#ef4444" opacity="0.7"/>
    <circle cx="48" cy="25" r="6" fill="#eab308" opacity="0.7"/>
    <circle cx="68" cy="25" r="6" fill="#22c55e" opacity="0.7"/>
    <text x="250" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.5)">MTP Workbench</text>

    <!-- Project cards mockup -->
    <g transform="translate(24, 70)">
      <!-- Project 1 -->
      <rect x="0" y="0" width="452" height="72" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="72" rx="2" fill="#6366f1"/>
      <text x="20" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.9)">Churn Risk Scoring</text>
      <text x="20" y="48" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.45)">3 packages  ·  Last active 2h ago</text>
      <rect x="360" y="16" width="72" height="22" rx="11" fill="rgba(99,102,241,0.3)"/>
      <text x="396" y="31" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="rgba(255,255,255,0.8)">Active</text>

      <!-- Project 2 -->
      <rect x="0" y="84" width="452" height="72" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <rect x="0" y="84" width="4" height="72" rx="2" fill="#22c55e"/>
      <text x="20" y="112" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.9)">Code Review Workflow</text>
      <text x="20" y="132" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.45)">5 packages  ·  Last active 1d ago</text>
      <rect x="360" y="100" width="72" height="22" rx="11" fill="rgba(34,197,94,0.3)"/>
      <text x="396" y="115" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="rgba(255,255,255,0.8)">Stable</text>

      <!-- Project 3 -->
      <rect x="0" y="168" width="452" height="72" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <rect x="0" y="168" width="4" height="72" rx="2" fill="#f59e0b"/>
      <text x="20" y="196" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.9)">Data Pipeline Setup</text>
      <text x="20" y="216" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.45)">2 packages  ·  Last active 3d ago</text>
      <rect x="360" y="184" width="72" height="22" rx="11" fill="rgba(245,158,11,0.3)"/>
      <text x="396" y="199" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="rgba(255,255,255,0.8)">Draft</text>
    </g>

    <!-- Bottom nav hint -->
    <g transform="translate(24, 330)">
      <rect x="0" y="0" width="452" height="46" rx="10" fill="rgba(255,255,255,0.04)"/>
      <text x="226" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.3)">Projects  ·  Compose  ·  Track  ·  Settings</text>
    </g>
  </g>
</svg>