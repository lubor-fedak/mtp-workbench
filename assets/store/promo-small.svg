<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" rx="0" fill="url(#bg)"/>
  <rect width="440" height="280" rx="0" fill="url(#shine)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="40" x2="440" y2="40" stroke="white" stroke-width="1"/>
    <line x1="0" y1="80" x2="440" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="120" x2="440" y2="120" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="440" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="440" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="440" y2="240" stroke="white" stroke-width="1"/>
    <line x1="55" y1="0" x2="55" y2="280" stroke="white" stroke-width="1"/>
    <line x1="110" y1="0" x2="110" y2="280" stroke="white" stroke-width="1"/>
    <line x1="165" y1="0" x2="165" y2="280" stroke="white" stroke-width="1"/>
    <line x1="220" y1="0" x2="220" y2="280" stroke="white" stroke-width="1"/>
    <line x1="275" y1="0" x2="275" y2="280" stroke="white" stroke-width="1"/>
    <line x1="330" y1="0" x2="330" y2="280" stroke="white" stroke-width="1"/>
    <line x1="385" y1="0" x2="385" y2="280" stroke="white" stroke-width="1"/>
  </g>

  <!-- Icon: stylized layers/methodology -->
  <g transform="translate(220, 70)">
    <rect x="-22" y="-18" width="44" height="36" rx="6" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <line x1="-12" y1="-8" x2="12" y2="-8" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="-12" y1="-1" x2="8" y2="-1" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="-12" y1="6" x2="14" y2="6" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="-12" y1="13" x2="6" y2="13" stroke="white" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Title -->
  <text x="220" y="128" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="-0.5">MTP Workbench</text>

  <!-- Subtitle -->
  <text x="220" y="156" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.8)">Methodology Workspace for AI Platforms</text>

  <!-- Platform indicators -->
  <g transform="translate(220, 200)">
    <g transform="translate(-120, 0)">
      <rect x="-30" y="-12" width="60" height="24" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="white">Claude</text>
    </g>
    <g transform="translate(-40, 0)">
      <rect x="-33" y="-12" width="66" height="24" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="white">ChatGPT</text>
    </g>
    <g transform="translate(43, 0)">
      <rect x="-32" y="-12" width="64" height="24" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="white">Gemini</text>
    </g>
    <g transform="translate(122, 0)">
      <rect x="-30" y="-12" width="60" height="24" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="white">Copilot</text>
    </g>
  </g>

  <!-- Bottom tagline -->
  <text x="220" y="252" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2">100% LOCAL  ·  ZERO CLOUD  ·  OPEN SOURCE</text>
</svg>